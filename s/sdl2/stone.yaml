name        : sdl2
version     : 2.30.11
release     : 6
homepage    : https://libsdl.org
upstreams   :
    - https://github.com/libsdl-org/SDL/releases/download/release-2.30.11/SDL2-2.30.11.tar.gz : 8b8d4aef2038533da814965220f88f77d60dfa0f32685f80ead65e501337da7f
summary     : Simple DirectMedia Library
description : |
    Simple DirectMedia Library
license     :
    - Zlib
install     : |
    %install_dir %(installroot)/%(datadir)/tmp
    touch %(installroot)/%(datadir)/tmp/%(name){,-devel,-dbginfo}
packages    :
    - "%(name)":
        paths:
            - /usr/share/tmp/sdl2
    - "%(name)-devel":
        paths:
            - /usr/share/tmp/sdl2-devel
    - "%(name)-dbginfo":
        paths:
            - /usr/share/tmp/sdl2-dbginfo
